<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <title>Profil étudiant</title>
</head>

<body>

<h1>Profil étudiant</h1>

<p>
    <strong>Nom :</strong>
    {{ etudiant.nom }}
</p>

<p>
    <strong>Prénom :</strong>
    {{ etudiant.prenom }}
</p>

<p>
    <strong>Groupe :</strong>
    {{ etudiant.groupe }}
</p>

<p>
    <strong>Email :</strong>
    {{ etudiant.email }}
</p>

{% if etudiant.photo %}

    <img
        src="{{ etudiant.photo.url }}"
        width="200"
    >

{% endif %}

</body>

</html>
