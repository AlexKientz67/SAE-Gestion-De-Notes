<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GestNotes RT{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'myfirstapp/style.css' %}">
</head>
<body>


    <nav class="navbar">
        <a href="/app/" class="navbar-brand">
            <span>🎓</span> GestNotes RT
        </a>

        <div class="navbar-links">
            {% block navbar_extra %}{% endblock %}
        </div>
    </nav>


    <main class="container">


        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}
        {% endblock %}

    </main>


    <footer class="footer">
        <p>🎓 GestNotes RT — BUT Réseaux & Télécommunications</p>
    </footer>

</body>
</html>
